services:
  db:
    image: mysql:8.1
    container_name: wp_db
    # restart: unless-stopped # lo rearrancará al iniciar la máquina a no ser que lo hayamos parado.
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password_seguro
      MYSQL_DATABASE: wordpress_db
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: wp_password
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    depends_on:
      - db
    image: wordpress:latest
    container_name: wp_app
    ports:
      - "8080:80"
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_password
      WORDPRESS_DB_NAME: wordpress_db
    volumes:
    # el primero es porque en casa no funciona 
    #el segundo es para el istituto si hay algun problema de pediendo donde este elimina uno de los dos y deja el otro
      - "C:/Users/kelvi/daw2/dise-o/worpres/wp_data/wp-content/themes:/var/www/html/wp-content/themes"
      - "wp_data:/var/www/html "
volumes:
  db_data:
  wp_data:
